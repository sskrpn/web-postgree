services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: web_user
      POSTGRES_PASSWORD: strongpswd
      POSTGRES_DB: web_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web_user -d web_postgres"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_USER: web_user
      DB_PASSWORD: strongpswd
      DB_NAME: web_postgres
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
